apiVersion: apps/v1
kind: Deployment
metadata:
  name: k8smicro-worker
  namespace: cloud-architect-agents
spec:
  replicas: 1
  selector:
    matchLabels:
      app: k8smicro-worker
  template:
    metadata:
      labels:
        app: k8smicro-worker
    spec:
      containers:
        - name: worker
          image: python:3.12-slim
          command:
            - sh
            - -c
            - |
              pip install -r /app/requirements.txt && \
              python /app/agents/k8smicro/worker.py
          env:
            - name: PYTHONUNBUFFERED
              value: "1"
          volumeMounts:
            - name: app-source
              mountPath: /app
      volumes:
        - name: app-source
          hostPath:
            path: /opt/cloud-architect-agents
            type: Directory
